<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Face Studio Pro</title>
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: 'Courier New', monospace; overflow: hidden; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; background: rgba(0,20,0,0.8); padding: 15px; border: 1px solid #0f0; border-radius: 5px; }
        #video-feed { position: absolute; right: 10px; bottom: 10px; width: 150px; border: 1px solid #0f0; transform: scaleX(-1); }
        .status-dot { height: 10px; width: 10px; background-color: #f00; border-radius: 50%; display: inline-block; margin-right: 5px; }
        #status-text { font-size: 12px; }
    </style>
</head>
<body>

    <div id="ui">
        <div style="font-size: 14px; font-weight: bold; margin-bottom: 5px;">AI_FACE_SYSTEM_v2.6</div>
        <div><span id="status-dot" class="status-dot"></span><span id="status-text">INITIALIZING...</span></div>
    </div>

    <video id="video-feed" autoplay playsinline></video>

    <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/examples/jsm/loaders/GLTFLoader.js": "https://unpkg.com/three@0.160.0/examples/jsm/loaders/GLTFLoader.js"
      }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
        import { FaceLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 1.0));
        const dirLight = new THREE.DirectionalLight(0xffffff, 2);
        dirLight.position.set(2, 2, 5);
        scene.add(dirLight);

        let faceMesh = null;
        let currentModel = null;
        const loader = new GLTFLoader();

        // Stable Three.js model link
        const MODEL_URL = 'https://raw.githack.com/mrdoob/three.js/dev/examples/models/gltf/facecap.glb';

        async function init() {
            try {
                const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm");
                const faceLandmarker = await FaceLandmarker.createFromOptions(vision, {
                    baseOptions: { 
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task",
                        delegate: "GPU" 
                    },
                    outputFaceBlendshapes: true,
                    runningMode: "VIDEO"
                });

                const stream = await navigator.mediaDevices.getUserMedia({ video: true });
                document.getElementById('video-feed').srcObject = stream;

                loader.load(MODEL_URL, (gltf) => {
                    currentModel = gltf.scene;
                    scene.add(currentModel);
                    currentModel.traverse(c => { if(c.morphTargetInfluences) faceMesh = c; });
                    camera.position.set(0, 0.2, 0.8);
                    
                    document.getElementById('status-dot').style.backgroundColor = "#0f0";
                    document.getElementById('status-text').innerText = "TRACKING ACTIVE";
                });

                function loop() {
                    const video = document.getElementById('video-feed');
                    if (video.readyState >= 2 && faceMesh) {
                        const results = faceLandmarker.detectForVideo(video, performance.now());
                        if (results.faceBlendshapes?.length > 0) {
                            const shapes = results.faceBlendshapes[0].categories;
                            shapes.forEach(s => {
                                const idx = faceMesh.morphTargetDictionary[s.categoryName];
                                if (idx !== undefined) {
                                    faceMesh.morphTargetInfluences[idx] = THREE.MathUtils.lerp(faceMesh.morphTargetInfluences[idx], s.score, 0.5);
                                }
                            });
                            const landmarks = results.faceLandmarks[0];
                            currentModel.rotation.y = THREE.MathUtils.lerp(currentModel.rotation.y, (landmarks[1].x - 0.5) * -1.2, 0.1);
                            currentModel.rotation.x = THREE.MathUtils.lerp(currentModel.rotation.x, (landmarks[1].y - 0.5) * 1.0, 0.1);
                        }
                    }
                    renderer.render(scene, camera);
                    requestAnimationFrame(loop);
                }
                loop();

            } catch (err) {
                document.getElementById('status-text').innerText = "ERROR: " + err.message;
            }
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
